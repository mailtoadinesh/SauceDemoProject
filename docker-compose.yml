version: '3.8'

services:

  # Selenium Grid Hub
  selenium-hub:
    image: selenium/hub:4.14.0
    container_name: selenium-hub
    ports:
      - "4442:4442"
      - "4443:4443"
      - "4444:4444"

  # Chrome Browser Node
  chrome:
    image: selenium/node-chrome:4.14.0
    container_name: chrome-node
    shm_size: '2gb'
    depends_on:
      - selenium-hub
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
    ports:
      - "7900:7900"    # VNC viewer to watch tests run live

  # Your Selenium Test Runner
  test-runner:
    build: .
    container_name: sauce-demo-tests
    depends_on:
      - chrome
    environment:
      - SELENIUM_GRID_URL=http://selenium-hub:4444/wd/hub
    volumes:
      - ./reports:/app/reports
      - ./screenshots:/app/screenshots
      - ./allure-results:/app/allure-results
      - ./test-output:/app/test-output